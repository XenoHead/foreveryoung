<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aisle GPS | Forever Young Records</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: #08111F; color: #FFF8DF; overflow-x: hidden; font-family: 'Outfit', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    
    :root { 
      --blue: #0A2C74; 
      --blueBright: #2C6CFF; 
      --yellow: #FFD447; 
      --cream: #FFF8DF; 
      --dark: #08111F; 
      --muted: #B6C0D7; 
    }
    
    /* Film Grain */
    body::before {
      content: ""; 
      position: fixed; 
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.06; 
      pointer-events: none; 
      z-index: 999; 
      animation: grainMove 8s steps(2) infinite;
    }
    @keyframes grainMove { 
      0% { transform: translate(0px, 0px); } 
      25% { transform: translate(-2px, 1px); } 
      50% { transform: translate(2px, -1px); } 
      75% { transform: translate(-1px, 2px); } 
      100% { transform: translate(0px, 0px); } 
    }
    
    /* Navigation */
    nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 100; backdrop-filter: blur(12px); background: rgba(8, 17, 31, 0.72); border-bottom: 1px solid rgba(255, 255, 255, 0.06); }
    .nav-inner { max-width: 1400px; margin: auto; padding: 1.1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .logo img { height: 58px; object-fit: contain; }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a { color: var(--cream); text-decoration: none; font-size: 0.95rem; letter-spacing: 1px; transition: all 0.3s ease; position: relative; }
    .nav-links a::after { content: ''; position: absolute; width: 0; height: 2px; bottom: -4px; left: 50%; background-color: var(--yellow); transition: all 0.3s ease; transform: translateX(-50%); }
    .nav-links a:hover { color: var(--yellow); text-shadow: 0 0 10px rgba(255, 212, 71, 0.4); }
    .nav-links a:hover::after { width: 100%; }

    /* GPS Specific Styles */
    .gps-header {
      padding: 150px 2rem 2rem;
      text-align: center;
      background: linear-gradient(to bottom, rgba(10, 44, 116, 0.2), transparent);
    }
    .gps-header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 4rem;
      color: var(--yellow);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 1rem;
    }
    .gps-header p.subtitle {
      color: var(--muted);
      font-size: 1.2rem;
      max-width: 600px;
      margin: auto;
    }

    .gps-content {
      max-width: 1200px;
      margin: 0 auto 6rem;
      padding: 0 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      flex: 1;
    }

    .gps-block {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      text-align: center;
    }

    .search-box {
      width: 100%;
      max-width: 600px;
      margin: 0 auto 2rem;
      display: flex;
      gap: 1rem;
    }

    .search-box input {
      flex: 1;
      padding: 1rem;
      background: rgba(0,0,0,0.5);
      border: 2px solid var(--blue);
      border-radius: 8px;
      color: var(--yellow);
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--yellow);
      box-shadow: 0 0 15px rgba(255,212,71,0.2);
    }

    .search-box button {
      padding: 0 2rem;
      background: var(--yellow);
      color: var(--dark);
      border: none;
      border-radius: 8px;
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem;
      text-transform: uppercase;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.3s;
    }

    .search-box button:hover {
      background: #FFF;
      transform: translateY(-2px);
    }

    .store-map {
      width: 100%;
      height: 1200px;
      background: rgba(0,0,0,0.5);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      position: relative;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .aisles-wrapper {
      display: flex;
      flex: 1;
      justify-content: space-around;
      align-items: stretch;
      padding-bottom: 120px; /* Space for door area */
      padding-left: 60px; /* Move aisles away from left door */
      gap: 60px;
      min-width: 1800px; /* Guarantee enough room between rows */
    }

    .aisle-group {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .connected-aisle {
      gap: 0;
    }
    
    .split-aisle {
      gap: 50px; /* Walkway split */
    }

    .aisle-block {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem;
      color: rgba(255,255,255,0.5);
      transition: all 0.3s ease;
      cursor: pointer;
      text-align: center;
      padding: 5px;
    }
    
    .connected-aisle .aisle-block:not(:last-child) {
      border-bottom: none;
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
    }
    .connected-aisle .aisle-block:not(:first-child) {
      border-top-left-radius: 0;
      border-top-right-radius: 0;
    }

    .aisle-block:hover, .aisle-block.active {
      background: rgba(255, 212, 71, 0.2);
      border-color: var(--yellow);
      box-shadow: 0 0 20px rgba(255, 212, 71, 0.4);
      color: var(--yellow);
      z-index: 2;
    }

    .store-entrance {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 80px;
      height: 80px;
      border: 2px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .store-entrance-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--yellow);
      box-shadow: 0 0 10px rgba(255,212,71,0.5);
    }

    .entrance-label {
      position: absolute;
      bottom: -25px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Animation Path */
    .animation-path {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    
    @media(max-width:900px) {
      .nav-inner { flex-direction: column; gap: 1rem; }
      .nav-links {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: #08111F;
        border-top: 2px solid #FFD447;
        padding: 1rem;
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem;
        z-index: 9999;
      }
      .nav-links a { font-size: 0.85rem; }
      .gps-header h1 { font-size: 2.5rem; }
      .search-box { flex-direction: column; }
      .search-box button { padding: 1rem; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <div class="logo">
        <a href="index.html"><img src="images/fyr-logo-removebg-preview.png" alt="Forever Young Records"></a>
      </div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="buying-hours.html">Buying Hours</a>
        <a href="location.html">Location</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <header class="gps-header">
    <h1>Aisle GPS</h1>
    <p class="subtitle">Navigate the massive archive to find exactly what you're looking for.</p>
  </header>

  <main class="gps-content">
    <div class="gps-block">
      <div class="search-box">
        <input type="text" placeholder="Search by Artist, Genre, or Category..." id="aisle-search">
        <button onclick="alert('Search functionality coming soon!')">Locate</button>
      </div>

      <div class="store-map" id="store-map">
        <svg class="animation-path" id="animation-layer"></svg>
        <div class="aisles-wrapper" id="aisles-container">
          <!-- Aisles will be generated by JS -->
        </div>
        
        <div class="store-entrance" id="entrance">
          <div class="store-entrance-circle"></div>
          <div class="entrance-label">Entrance</div>
        </div>
      </div>
    </div>
  </main>

  <div style="width: 100%; display: flex; justify-content: center; align-items: center; padding: 1rem; border-top: 1px solid rgba(255, 255, 255, 0.05); background: rgba(0, 0, 0, 0.18); margin-top: auto;">
    <a href="https://www.xenohead.com" target="_blank" style="display: flex; align-items: center; gap: 0.8rem; text-decoration: none; color: #BFC7DA; font-size: 0.82rem; letter-spacing: 1px; transition: 0.3s ease;">
      <img src="images/XenoHead_logo.png" alt="XenoHead" style="height: 50px; border-radius: 4px;">
      <span>WebDev: www.xenohead.com</span>
    </a>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('aisles-container');
      const numAisles = 10;
      
      const aisleData = {
        '1A': 'Used 45s',
        '1B': 'Used 45s',
        '1C': 'Used CDs',
        '1D': 'Used CDs',
        '2A': '',
        '2B': '',
        '2C': 'Extreme Metal',
        '2D': 'Extreme Metal',
        '3A': 'CD Soundtracks',
        '3B': 'CD Soundtracks',
        '3C': 'CD Soundtracks',
        '3D': 'Latin Music',
        '4C': "70s-00s CDs (Pop, Rock, R&B, Punk, Metal)",
        '4D': "70s-00s CDs (Pop, Rock, R&B, Punk, Metal)"
      };
      
      // Generate 10 aisles, 4 levels each
      for(let i=1; i<=numAisles; i++) {
        const aisleGroup = document.createElement('div');
        aisleGroup.className = 'aisle-group';
        
        if (i === 1 || i === 2) {
          aisleGroup.classList.add('connected-aisle');
        } else {
          aisleGroup.classList.add('split-aisle');
        }
        
        const levels = ['A', 'B', 'C', 'D'];
        levels.forEach(lvl => {
          const id = i + lvl;
          const block = document.createElement('div');
          block.className = 'aisle-block';
          block.id = 'aisle-' + id;
          
          const label = aisleData[id] ? `<span style="font-size:0.75rem; color:var(--light); font-family:'Outfit',sans-serif; margin-top:5px; line-height:1.1;">${aisleData[id]}</span>` : '';
          block.innerHTML = `<strong>${id}</strong>${label}`;
          
          block.addEventListener('click', () => animateToAisle(block));
          aisleGroup.appendChild(block);
        });
        
        container.appendChild(aisleGroup);
      }
    });

    function animateToAisle(targetBlock) {
      // Reset previous highlights
      document.querySelectorAll('.aisle-block').forEach(a => a.classList.remove('active'));
      targetBlock.classList.add('active');

      
      const svg = document.getElementById('animation-layer');
      const entrance = document.getElementById('entrance');
      const map = document.getElementById('store-map');
      
      const mapRect = map.getBoundingClientRect();
      const entranceRect = entrance.getBoundingClientRect();
      const targetRect = targetBlock.getBoundingClientRect();
      
      // Calculate relative coordinates
      const startX = (entranceRect.left - mapRect.left) + (entranceRect.width / 2);
      const startY = (entranceRect.top - mapRect.top) + (entranceRect.height / 2);
      
      const endX = (targetRect.left - mapRect.left) + (targetRect.width / 2);
      const endY = (targetRect.bottom - mapRect.top) + 20; // Just below the target block
      
      // Create SVG Path
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      
      // Draw a path from entrance, up, then right to the aisle, then up to the aisle
      // Using an L shaped path
      const d = `M ${startX} ${startY} L ${startX} ${endY} L ${endX} ${endY} L ${endX} ${targetRect.bottom - mapRect.top}`;
      
      path.setAttribute('d', d);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', '#FFD447');
      path.setAttribute('stroke-width', '4');
      path.setAttribute('stroke-dasharray', '10, 10');
      path.setAttribute('class', 'path-anim');
      
      // Clear old paths
      svg.innerHTML = '';
      
      // Animate line drawing
      const length = 1000; // rough estimate
      path.style.strokeDasharray = length;
      path.style.strokeDashoffset = length;
      
      // Trigger animation via CSS
      path.animate([
        { strokeDashoffset: length },
        { strokeDashoffset: 0 }
      ], {
        duration: 1000,
        easing: 'ease-in-out',
        fill: 'forwards'
      });
      
      svg.appendChild(path);
      
      // Pulse the target block after path finishes
      setTimeout(() => {
        targetBlock.style.transform = 'scale(1.05)';
        setTimeout(() => {
           targetBlock.style.transform = 'scale(1)';
        }, 300);
      }, 1000);
    }
    
    // Wire up search button
    document.querySelector('.search-box button').addEventListener('click', () => {
      const input = document.getElementById('aisle-search').value.trim();
      if(!input) return;
      
      // Simple mockup logic: pick a random block to demo the animation
      const randomAisleNum = Math.floor(Math.random() * 10) + 1;
      const levelsArray = ['A', 'B', 'C', 'D'];
      const randomLevel = levelsArray[Math.floor(Math.random() * levelsArray.length)];
      const target = document.getElementById('aisle-' + randomAisleNum + randomLevel);
      animateToAisle(target);
    });
  </script>
</body>
</html>
