<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forever Young Records</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');

    :root {
      --bg-color: #050505;
      --accent-color: #f5a623;
      --text-main: #ffffff;
      --text-muted: #888888;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
    }

    /* Ambient background glow */
    .ambient-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(245, 166, 35, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
      z-index: 0;
      pointer-events: none;
      filter: blur(50px);
      animation: pulseGlow 8s infinite alternate ease-in-out;
    }

    @keyframes pulseGlow {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    }

    .top-banner {
      width: 100%;
      height: 300px;
      margin-bottom: 4rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      animation: slideDown 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      z-index: 10;
      border-bottom: 2px solid rgba(245, 166, 35, 0.2);
    }

    .top-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 65%; /* Adjusted framing downwards */
      filter: contrast(1.1) brightness(0.9);
    }

    /* Add a subtle gradient overlay so it blends into the page */
    .top-banner::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 40%;
      background: linear-gradient(to top, var(--bg-color) 0%, transparent 100%);
      pointer-events: none;
    }

    .centerpiece-container {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 1000px;
      animation: floatUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.3s;
      opacity: 0;
      transform: translateY(40px);
    }

    .image-wrapper {
      position: relative;
      border-radius: 20px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .image-wrapper:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 30px 60px rgba(245, 166, 35, 0.2), inset 0 0 0 1px rgba(255,255,255,0.1);
    }

    .image-wrapper img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      transition: filter 0.4s ease;
    }

    .image-wrapper:hover img {
      filter: brightness(1.1) contrast(1.05);
    }

    /* Subtle reflection */
    .reflection {
      position: absolute;
      bottom: -40px;
      left: 10px;
      right: 10px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0) 100%);
      filter: blur(5px);
      border-radius: 0 0 20px 20px;
      pointer-events: none;
    }

    .store-text-only {
      width: 90%;
      max-width: 800px;
      text-align: center;
      margin-top: 6rem;
      margin-bottom: 2rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 3rem;
      z-index: 10;
      opacity: 0;
      transform: translateY(40px);
      animation: floatUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.6s;
    }

    .store-text-only h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: var(--accent-color);
    }

    .store-text-only p {
      font-size: 1.1rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .classics-banner {
      width: 100%;
      margin-top: 2rem;
      margin-bottom: 6rem;
      position: relative;
      height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .classics-banner img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.4;
      filter: blur(1px) contrast(1.1);
      z-index: 0;
    }

    .classics-banner::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, var(--bg-color) 0%, transparent 20%, transparent 80%, var(--bg-color) 100%);
      z-index: 1;
      pointer-events: none;
    }

    .classics-content {
      position: relative;
      z-index: 2;
      text-align: center;
      background: rgba(5, 5, 5, 0.6);
      padding: 3rem 4rem;
      border-radius: 16px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(245, 166, 35, 0.2);
    }

    .classics-content h2 {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      color: var(--accent-color);
      margin-bottom: 0.5rem;
      text-shadow: 0 4px 12px rgba(0,0,0,0.8);
    }

    .classics-content p {
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-main);
    }

    @keyframes slideDown {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floatUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="ambient-glow"></div>
  
  <header class="top-banner">
    <img src="storefront_art_no_cars.png" alt="Forever Young Records Awning">
  </header>

  <main class="centerpiece-container">
    <div class="image-wrapper">
      <img src="juke-wall.png" alt="Jukebox Wall Centerpiece">
      <div class="reflection"></div>
    </div>
  </main>

  <section class="store-text-only">
    <h2>Visit the Physical Stronghold</h2>
    <p>Hosting hundreds of thousands of active physical properties on our Grand Prairie showroom floor. Come get lost in the endless aisles of our iconic retro location.</p>
  </section>

  <section class="classics-banner">
    <img src="retro_rock_influence.png" alt="Retro Rock Vibe Background">
    <div class="classics-content">
      <h2>The Classics Live On</h2>
      <p>Explore the golden era of rock and roll</p>
    </div>
  </section>
</body>
</html>
