<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Online Product | Forever Young Records</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --dark: #08111F;
      --blue: #152B4D;
      --yellow: #FFD447;
      --green: #2ecc71;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--dark);
      color: #FFF8DF;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 0;
    }

    header {
      width: 100%;
      padding: 2rem;
      text-align: center;
      background: linear-gradient(180deg, rgba(21,43,77,0.8) 0%, rgba(8,17,31,0) 100%);
      z-index: 10;
    }

    .logo {
      max-width: 150px;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 10px rgba(255, 212, 71, 0.3));
    }

    h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 2.5rem;
      color: var(--yellow);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      padding: 2rem;
      z-index: 10;
      display: flex;
      gap: 2rem;
    }

    .image-column {
      flex: 1.5;
    }

    .image-placeholder {
      width: 100%;
      aspect-ratio: 1;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255, 212, 71, 0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .details-column {
      flex: 2;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .input-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .input-group input,
    .input-group select,
    .input-group textarea {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255, 212, 71, 0.3);
      color: #FFF;
      padding: 0.5rem;
      border-radius: 4px;
      font-size: 0.9rem;
      font-family: 'Outfit', sans-serif;
    }

    .input-group input:focus,
    .input-group select:focus,
    .input-group textarea:focus {
      outline: none;
      border-color: var(--yellow);
    }
    
    .input-group .small-input {
        width: 60px;
    }

    .input-group .price-input {
        width: 100px;
    }
    
    .input-group label {
        font-size: 0.8rem;
        color: #B6C0D7;
        margin-right: 0.5rem;
    }

    .full-width {
        width: 100%;
    }

    .notes-textarea {
        min-height: 80px;
        resize: vertical;
    }
    
    .go-btn {
        background: var(--yellow);
        color: var(--dark);
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        font-family: 'Oswald', sans-serif;
        font-size: 0.9rem;
        cursor: pointer;
    }

    .accordion {
        background: rgba(0,0,0,0.2);
        border-radius: 4px;
        margin-top: 1rem;
    }

    .accordion-header {
        background: rgba(0,0,0,0.3);
        padding: 0.5rem 1rem;
        cursor: pointer;
        border-radius: 4px;
    }

    .accordion-content {
        padding: 1rem;
        display: none;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }
  </style>
</head>
<body>

  <header>
    <a href="/"><img src="images/fyr-logo.png" alt="Forever Young Records" class="logo"></a>
    <h1>Edit Online Product</h1>
  </header>

  <div class="container">
    <div class="image-column">
      <div class="image-placeholder">
        <img src="" alt="Product Image" style="width: 100%; height: 100%; object-fit: cover; display: none;">
        <span>No Image</span>
      </div>
    </div>
    <div class="details-column">
        <div class="input-group">
            <input type="text" id="quantity" class="small-input" placeholder="QTY">
            <input type="text" id="artist" placeholder="ARTIST" class="full-width">
            <input type="text" id="title" placeholder="TITLE" class="full-width">
            <input type="text" id="price" class="price-input" placeholder="PRICE">
        </div>
        <div class="input-group">
            <input type="text" id="sku" placeholder="SKU" class="full-width">
            <input type="text" id="cat" placeholder="CAT#" class="full-width">
            <input type="text" id="upc" placeholder="UPC/BARCODE" class="full-width">
        </div>
        <div class="input-group">
            <input type="text" id="format" placeholder="FORMAT" class="full-width">
            <input type="text" id="media_condition" placeholder="MEDIA CONDITION" class="full-width">
            <input type="text" id="sleeve_condition" placeholder="SLEEVE CONDITION" class="full-width">
        </div>
        <textarea id="notes" class="full-width notes-textarea" placeholder="Condition Description & Notes"></textarea>
        <div class="input-group">
            <input type="text" id="label" placeholder="LABEL" class="full-width">
            <input type="text" id="country" placeholder="COUNTRY" class="full-width">
            <input type="text" id="rel_date" placeholder="REL DATE" class="full-width">
        </div>
        <div class="input-group">
            <label for="discogs_id">DISCOGS ID:</label>
            <input type="text" id="discogs_id" placeholder="DISCOGS ID" class="full-width">
            <input type="text" id="discogs_url" placeholder="DISCOGS URL" class="full-width">
            <button class="go-btn">Go</button>
        </div>

        <div class="accordion">
            <div class="accordion-header">Media</div>
            <div class="accordion-content">
                <input type="text" id="front_image_url" placeholder="Front Image URL" class="full-width">
                <input type="text" id="back_image_url" placeholder="Back Image URL" class="full-width">
                <input type="text" id="youtube_urls" placeholder="Audio / YouTube URLs (Comma-separated)" class="full-width">
            </div>
        </div>
    </div>
  </div>

  <script>
    document.querySelector('.accordion-header').addEventListener('click', () => {
      const content = document.querySelector('.accordion-content');
      if (content.style.display === 'none' || content.style.display === '') {
        content.style.display = 'flex';
      } else {
        content.style.display = 'none';
      }
    });
  </script>

</body>
</html>
